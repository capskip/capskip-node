name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        # npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
        run: npm install -g npm@latest

      - name: Run tests
        run: npm test

      - name: Publish to npm
        # Publishes via npm Trusted Publishing (OIDC) using the id-token permission
        # above — no NPM_TOKEN secret required. Build provenance is emitted too.
        run: npm publish --provenance --access public
